services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: 
          - .env
    volumes:
      - ./backend:/app  
      - ${MATERIALS_FOLDER}:/materials

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file: 
          - .env
    volumes:
      - ./frontend:/app  
      - /app/node_modules