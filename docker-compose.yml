services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8000"
    command: uvicorn main:app --host 0.0.0.0 --reload
    env_file: 
          - .env
    volumes:
      - ./backend:/app  
      - ${MATERIALS_FOLDER}:/materials
      - ${ENVISIONHGDETECTOR_OUTPUT}:/envisionhgdetector_output

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    env_file: 
          - .env
    volumes:
      - ./frontend:/app  
      - /app/node_modules